{% extends "base.html" %}

{% block title %}Login - My Trading Journal{% endblock %}

{% block content %}
<div class="bg-white rounded-xl p-8 shadow-lg max-w-sm w-full">
  <h2 class="text-2xl font-bold text-gray-800 text-center">Login</h2>
  <form method="POST" class="mt-4 space-y-4">
    <div>
      <label class="block text-gray-600 font-semibold">Username</label>
      <input name="username" required class="w-full p-2 rounded border mt-1" autocomplete="username">
    </div>
    <div>
      <label class="block text-gray-600 font-semibold">Password</label>
      <input type="password" name="password" required class="w-full p-2 rounded border mt-1" autocomplete="current-password">
    </div>
    <div class="text-center">
      <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold rounded px-4 py-2">Login</button>
    </div>
  </form>
  <p class="text-center mt-4 text-gray-500">Don't have an account? 
    <a href="{{ url_for('register') }}" class="text-blue-600 hover:underline">Register</a>
  </p>
</div>
{% endblock %}
