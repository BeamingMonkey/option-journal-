<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Trade - My Trading Journal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #3b82f6;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            color: #222;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #2563eb;
        }

        footer {
            text-align: center;
            font-size: 14px;
            color: #555;
            margin-top: 40px;
            padding: 20px 0;
            background-color: #e2e8f0;
        }
    </style>
</head>
<body>

<header>My Trading Journal</header>

<div class="container">
    <h2>Log New Trade</h2>
    <form action="/log" method="POST">
        <label for="symbol">Symbol:</label>
        <input type="text" name="symbol" required>

        <label for="entry">Entry Price:</label>
        <input type="number" step="0.01" name="entry" required>

        <label for="exit">Exit Price:</label>
        <input type="number" step="0.01" name="exit" required>

        <label for="qty">Quantity:</label>
        <input type="number" name="qty" required>

        <label for="currency">Currency:</label>
        <select name="currency" required>
            <option value="INR">INR</option>
            <option value="USD">USD</option>
        </select>

        <label for="reason">Reason:</label>
        <textarea name="reason" rows="4" required></textarea>

        <button type="submit">Log Trade</button>
    </form>
</div>

<footer>All rights reserved © Buildwitharunraj</footer>

</body>
</html>
