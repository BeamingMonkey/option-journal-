<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trading Journal - Log Trade</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2563eb;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            max-width: 500px;
            margin: 30px auto;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #334155;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 18px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .nav {
            text-align: center;
            margin-top: 20px;
        }

        .nav a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 600;
        }

        footer {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            padding: 20px 10px;
        }
    </style>
</head>
<body>

<header>My Trading Journal</header>

<div class="container">
    <h2>Log New Trade</h2>
    <form method="POST" action="/log">
        <label for="symbol">Symbol</label>
        <input type="text" id="symbol" name="symbol" required>

        <label for="entry">Entry Price</label>
        <input type="number" step="0.01" id="entry" name="entry" required>

        <label for="exit">Exit Price</label>
        <input type="number" step="0.01" id="exit" name="exit" required>

        <label for="qty">Quantity</label>
        <input type="number" id="qty" name="qty" required>

        <label for="currency">Currency</label>
        <select name="currency" id="currency" required>
            <option value="INR">INR</option>
            <option value="USD">USD</option>
        </select>

        <label for="reason">Reason</label>
        <textarea id="reason" name="reason" rows="3" placeholder="Setup / TP / SL / News etc."></textarea>

        <button type="submit">Log Trade</button>
    </form>

    <div class="nav">
        <a href="/past">View Past Trades</a> | 
        <a href="/logout">Logout</a>
    </div>
</div>

<footer>All rights reserved © Buildwitharunraj</footer>

</body>
</html>
