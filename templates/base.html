<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{% block title %}Trading Journal{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="container py-4">
  <nav class="mb-4">
    <a href="{{ url_for('index') }}" class="me-3">Home</a>
    <a href="{{ url_for('log_trade') }}" class="me-3">Log Trade</a>
    <a href="{{ url_for('past_trades') }}" class="me-3">Past Trades</a>
    <a href="{{ url_for('dashboard') }}" class="me-3">Dashboard</a>
    <a href="{{ url_for('export_csv') }}" class="me-3">Export CSV</a>
    {% if current_user.is_authenticated %}
      <span class="float-end">Logged in as: <strong>{{ current_user.username }}</strong> | <a href="{{ url_for('logout') }}">Logout</a></span>
    {% else %}
      <a href="{{ url_for('login') }}" class="float-end">Login</a>
    {% endif %}
  </nav>

  {% block content %}{% endblock %}
</body>
</html>
