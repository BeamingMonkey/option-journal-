<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Trading Journal{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding-bottom: 60px;
        }
        header {
            background: #1f2937;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1f2937;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
        }
        .content {
            padding: 20px;
        }
        .profit { color: green; }
        .loss { color: red; }
    </style>
</head>
<body>
    <header>
        My Trading Journal
    </header>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <footer>
        © All rights reserved | buildwitharunraj
    </footer>
</body>
</html>
