<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>{% block title %}My Trading Journal{% endblock %}</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white p-4 flex justify-between items-center">
        <div class="text-2xl font-bold">My Trading Journal</div>
        <div>
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('index') }}" class="mr-4 hover:underline">Home</a>
                <a href="{{ url_for('dashboard') }}" class="mr-4 hover:underline">Dashboard</a>
                <a href="{{ url_for('log_trade') }}" class="mr-4 hover:underline">Log Trade</a>
                <a href="{{ url_for('past_trades') }}" class="mr-4 hover:underline">Past Trades</a>
                <a href="{{ url_for('logout') }}" class="hover:underline">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="mr-4 hover:underline">Login</a>
                <a href="{{ url_for('register') }}" class="hover:underline">Register</a>
            {% endif %}
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-start p-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-300 text-center p-4">
        &copy; 2025 My Trading Journal — built with ❤️ by Arun Raj
    </footer>
</body>
</html>
