<!DOCTYPE html>
<html>
<head>
    <title>My Trading Journal</title>
    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">
<nav class="bg-blue-600 p-4 text-white flex justify-between">
    <div class="font-bold">My Trading Journal</div>
    <div>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('index') }}" class="mr-4">Home</a>
            <a href="{{ url_for('past_trades') }}" class="mr-4">Past Trades</a>
            <a href="{{ url_for('dashboard') }}" class="mr-4">Dashboard</a>
            <a href="{{ url_for('export_csv') }}" class="mr-4">Export</a>
            <a href="{{ url_for('logout') }}" class="mr-4">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="mr-4">Login</a>
            <a href="{{ url_for('register') }}" class="mr-4">Register</a>
        {% endif %}
    </div>
</nav>
<main class="flex-grow p-6 flex flex-col items-center">
    {% block content %}{% endblock %}
</main>
<footer class="bg-gray-800 text-white p-4 text-center">© 2025 My Trading Journal</footer>
</body>
</html>
