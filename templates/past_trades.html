<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Past Trades - My Trading Journal</title>
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #3b82f6;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .container {
            max-width: 960px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        a {
            text-decoration: none;
            color: #3b82f6;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #3b82f6;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9fbff;
        }
        .pnl-positive {
            color: green;
            font-weight: bold;
        }
        .pnl-negative {
            color: red;
            font-weight: bold;
        }
        @media screen and (max-width: 600px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }
            tr {
                margin-bottom: 15px;
                border-bottom: 2px solid #ccc;
            }
            td, th {
                padding-left: 50%;
                position: relative;
            }
            td::before, th::before {
                position: absolute;
                left: 10px;
                width: 45%;
                white-space: nowrap;
                font-weight: bold;
            }
            td:nth-of-type(1)::before { content: "Symbol"; }
            td:nth-of-type(2)::before { content: "Entry"; }
            td:nth-of-type(3)::before { content: "Exit"; }
            td:nth-of-type(4)::before { content: "Qty"; }
            td:nth-of-type(5)::before { content: "Currency"; }
            td:nth-of-type(6)::before { content: "Reason"; }
            td:nth-of-type(7)::before { content: "Timestamp"; }
            td:nth-of-type(8)::before { content: "PnL"; }
        }
    </style>
</head>
<body>
<header>My Trading Journal</header>
<div class="container">
    <h1>Past Trades</h1>
    <a href="/log">Log New Trade</a>
    <table>
        <thead>
        <tr>
            <th>Symbol</th>
            <th>Entry</th>
            <th>Exit</th>
            <th>Qty</th>
            <th>Currency</th>
            <th>Reason</th>
            <th>Timestamp</th>
            <th>PnL</th>
        </tr>
        </thead>
        <tbody>
        {% for t in trades %}
        <tr>
            <td>{{ t[0] }}</td>
            <td>{{ t[1] }}</td>
            <td>{{ t[2] }}</td>
            <td>{{ t[3] }}</td>
            <td>{{ t[4] }}</td>
            <td>{{ t[5] }}</td>
            <td>{{ t[6] }}</td>
            <td class="{{ 'pnl-positive' if t[7] >= 0 else 'pnl-negative' }}">{{ "%.2f"|format(t[7]) }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
