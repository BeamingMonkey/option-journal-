{% extends "base.html" %}
{% block title %}Log Trade{% endblock %}
{% block content %}
  <h2>Log a Trade</h2>
  <form method="POST">
    <input type="text" name="symbol" placeholder="Symbol" required>
    <input type="number" step="0.01" name="entry_price" placeholder="Entry Price" required>
    <input type="number" step="0.01" name="exit_price" placeholder="Exit Price" required>
    <input type="text" name="strategy" placeholder="Strategy Used" required>
    <textarea name="notes" placeholder="Notes"></textarea>
    <button type="submit">Save Trade</button>
  </form>
{% endblock %}
