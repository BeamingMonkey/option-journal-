<!DOCTYPE html>
<html>
<head>
    <title>Log Trade - My Trading Journal</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="max-w-2xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-center text-blue-600">My Trading Journal</h1>
        <h2 class="text-xl text-center mt-2">Log a New Trade</h2>
        <form method="POST" class="bg-white rounded-lg shadow p-4 mt-4 space-y-3">
            <!-- Trade Type -->
            <label class="block">
                <span class="font-semibold">Trade Type</span>
                <select name="trade_type" required class="mt-1 block w-full rounded border p-2">
                    <option value="option">Option</option>
                    <option value="future">Future</option>
                    <option value="stock">Stock</option>
                    <option value="forex">Forex</option>
                    <option value="crypto">Crypto</option>
                </select>
            </label>

            <!-- Position -->
            <label class="block">
                <span class="font-semibold">Position</span>
                <select name="position" required class="mt-1 block w-full rounded border p-2">
                    <option value="buy">Buy</option>
                    <option value="sell">Sell</option>
                </select>
            </label>

            <!-- Symbol -->
            <label class="block">
                <span class="font-semibold">Symbol</span>
                <select name="symbol" required class="mt-1 block w-full rounded border p-2">
                    <option value="Nifty 50">Nifty 50</option>
                    <option value="Nifty Midcap">Nifty Midcap</option>
                    <option value="Sensex">Sensex</option>
                    <option value="BankEx">BankEx</option>
                    <option value="FinNifty">FinNifty</option>
                </select>
            </label>

            <!-- Entry -->
            <label class="block">
                <span class="font-semibold">Entry Price</span>
                <input type="number" name="entry" step="0.01" required class="mt-1 block w-full rounded border p-2">
            </label>

            <!-- Exit -->
            <label class="block">
                <span class="font-semibold">Exit Price</span>
                <input type="number" name="exit" step="0.01" required class="mt-1 block w-full rounded border p-2">
            </label>

            <!-- Quantity -->
            <label class="block">
                <span class="font-semibold">Quantity</span>
                <input type="number" name="qty" required class="mt-1 block w-full rounded border p-2">
            </label>

            <!-- Currency -->
            <label class="block">
                <span class="font-semibold">Currency</span>
                <input type="text" name="currency" required class="mt-1 block w-full rounded border p-2">
            </label>

            <!-- Reason -->
            <label class="block">
                <span class="font-semibold">Reason for Trade</span>
                <textarea name="reason" required class="mt-1 block w-full rounded border p-2"></textarea>
            </label>

            <!-- Strategy -->
            <label class="block">
                <span class="font-semibold">Strategy (Optional)</span>
                <input type="text" name="strategy" class="mt-1 block w-full rounded border p-2">
            </label>

            <div class="text-center mt-4">
                <button class="bg-blue-600 text-white rounded px-4 py-2 hover:bg-blue-700" type="submit">Log Trade</button>
            </div>
        </form>
    </div>
    <footer class="text-center mt-6 text-gray-500 text-sm">
        &copy; 2025 My Trading Journal - built with ❤️ by Arun Raj
    </footer>
</body>
</html>
