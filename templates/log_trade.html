{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <h2>Log a Trade</h2>
    <form method="post" class="mt-3">
      <div class="row g-3">
        <div class="col-md-3"><label>Symbol</label><input name="symbol" class="form-control" required></div>
        <div class="col-md-3"><label>Entry Price</label><input name="entry" type="number" step="0.01" class="form-control" required></div>
        <div class="col-md-3"><label>Exit Price</label><input name="exit" type="number" step="0.01" class="form-control" required></div>
        <div class="col-md-3"><label>Qty</label><input name="qty" type="number" class="form-control" required></div>
      </div>
      <div class="row g-3 mt-2">
        <div class="col-md-4"><label>Currency</label><input name="currency" class="form-control" required></div>
        <div class="col-md-4"><label>Strategy</label><input name="strategy" class="form-control"></div>
      </div>
      <div class="mt-3"><label>Reason</label><textarea name="reason" class="form-control" rows="3" required></textarea></div>
      <button type="submit" class="btn btn-success mt-3">Submit</button>
    </form>
  </div>
</div>
{% endblock %}
