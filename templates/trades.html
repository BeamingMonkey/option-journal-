<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Past Trades</title>
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 30px 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 1.2px;
            color: #222;
        }

        a {
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 600;
            color: #3b82f6;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #2563eb;
            text-decoration: underline;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            padding: 14px 12px;
            border-bottom: 1.5px solid #ddd;
            text-align: left;
            word-wrap: break-word;
        }

        th {
            background-color: #3b82f6;
            color: white;
            font-weight: 700;
        }

        tr:nth-child(even) {
            background-color: #f9fbff;
        }

        tr:hover {
            background-color: #e1efff;
        }

        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead tr {
                display: none;
            }

            tr {
                margin-bottom: 20px;
                border-bottom: 2px solid #3b82f6;
                padding-bottom: 12px;
            }

            td {
                text-align: right;
                padding-left: 50%;
                position: relative;
            }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 12px;
                width: 45%;
                padding-left: 10px;
                font-weight: 600;
                text-align: left;
                color: #3b82f6;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Past Trades</h1>
        <a href="/">Log New Trade</a>
        <table>
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Entry</th>
                    <th>Exit</th>
                    <th>Reason</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody>
                {% for t in trades %}
                <tr>
                    <td data-label="Symbol">{{ t[0] }}</td>
                    <td data-label="Entry">{{ t[1] }}</td>
                    <td data-label="Exit">{{ t[2] }}</td>
                    <td data-label="Reason">{{ t[3] }}</td>
                    <td data-label="Timestamp">{{ t[4] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
