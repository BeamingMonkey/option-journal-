<!DOCTYPE html>
<html>
<head>
    <title>Past Trades</title>
</head>
<body>
    <h1>Past Trades</h1>
    <a href="/">Log New Trade</a>
    <table border="1">
        <tr>
            <th>Symbol</th>
            <th>Entry</th>
            <th>Exit</th>
            <th>Reason</th>
            <th>Timestamp</th>
        </tr>
        {% for t in trades %}
        <tr>
            <td>{{ t[0] }}</td>
            <td>{{ t[1] }}</td>
            <td>{{ t[2] }}</td>
            <td>{{ t[3] }}</td>
            <td>{{ t[4] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
